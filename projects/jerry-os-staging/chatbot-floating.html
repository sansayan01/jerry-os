<!-- Floating Chatbot Popup -->
<div id="chatbot-container">
    <!-- Floating Button -->
    <div id="chatbot-button" onclick="toggleChatbot()">
        <div class="chatbot-icon">
            <i data-lucide="bot"></i>
        </div>
        <div class="chatbot-badge">1</div>
    </div>

    <!-- Chat Window -->
    <div id="chatbot-window">
        <div class="chatbot-header">
            <div class="chatbot-title">
                <i data-lucide="bot"></i>
                <span>Jerry Assistant</span>
            </div>
            <div class="chatbot-status">
                <span class="status-dot online"></span>
                <span>Online</span>
            </div>
            <button class="chatbot-close" onclick="toggleChatbot()">
                <i data-lucide="x"></i>
            </button>
        </div>

        <div id="chatbot-messages">
            <div class="chatbot-welcome">
                <div class="welcome-icon">
                    <i data-lucide="sparkles"></i>
                </div>
                <p>Hey there! 👋</p>
                <p>I'm Jerry, your executive assistant. How can I help you today?</p>
            </div>
        </div>

        <div class="chatbot-input-area">
            <input type="text" 
                   id="chatbot-input" 
                   placeholder="Type your message..." 
                   onkeypress="handleChatbotKeyPress(event)">
            <button id="chatbot-send" onclick="sendChatbotMessage()">
                <i data-lucide="send"></i>
            </button>
        </div>
    </div>
</div>

<style>
/* Floating Chatbot Styles */
#chatbot-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 1000;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

/* Floating Button */
#chatbot-button {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00e5ff, #007AFF);
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0, 229, 255, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    position: relative;
}

#chatbot-button:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 20px rgba(0, 229, 255, 0.6);
}

.chatbot-icon {
    font-size: 28px;
    color: white;
}

.chatbot-badge {
    position: absolute;
    top: -5px;
    right: -5px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #FF3B30;
    color: white;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

.chatbot-badge.hidden {
    display: none;
}

/* Chat Window */
#chatbot-window {
    position: absolute;
    bottom: 70px;
    right: 0;
    width: 350px;
    height: 500px;
    background: rgba(15, 15, 20, 0.98);
    border-radius: 16px;
    border: 1px solid rgba(0, 229, 255, 0.3);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    display: none;
    flex-direction: column;
    overflow: hidden;
    backdrop-filter: blur(10px);
}

#chatbot-window.active {
    display: flex;
    animation: slideUp 0.3s ease-out;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Header */
.chatbot-header {
    background: linear-gradient(135deg, rgba(0, 229, 255, 0.2), rgba(0, 122, 255, 0.2));
    padding: 15px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(0, 229, 255, 0.2);
}

.chatbot-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    color: #00e5ff;
}

.chatbot-title i {
    font-size: 20px;
}

.chatbot-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.6);
}

.status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
}

.status-dot.online {
    background: #34C759;
    box-shadow: 0 0 10px #34C759;
}

.chatbot-close {
    background: none;
    border: none;
    color: rgba(255, 255, 255, 0.6);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    transition: all 0.2s;
}

.chatbot-close:hover {
    color: white;
    background: rgba(255, 255, 255, 0.1);
}

/* Messages Area */
#chatbot-messages {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.chatbot-welcome {
    text-align: center;
    padding: 20px;
    color: rgba(255, 255, 255, 0.8);
}

.welcome-icon {
    font-size: 40px;
    margin-bottom: 10px;
    color: #00e5ff;
}

.chatbot-welcome p {
    margin: 8px 0;
    line-height: 1.4;
}

.chatbot-message {
    display: flex;
    gap: 8px;
    align-items: flex-end;
}

.chatbot-message.user {
    flex-direction: row-reverse;
}

.message-content {
    background: rgba(255, 255, 255, 0.1);
    padding: 10px 14px;
    border-radius: 16px;
    max-width: 80%;
    word-wrap: break-word;
}

.chatbot-message.user .message-content {
    background: linear-gradient(135deg, #00e5ff, #007AFF);
    color: white;
}

.message-time {
    font-size: 10px;
    color: rgba(255, 255, 255, 0.4);
    margin-top: 4px;
}

/* Input Area */
.chatbot-input-area {
    padding: 15px;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    gap: 10px;
}

#chatbot-input {
    flex: 1;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    padding: 10px 16px;
    color: white;
    font-size: 14px;
    outline: none;
}

#chatbot-input::placeholder {
    color: rgba(255, 255, 255, 0.4);
}

#chatbot-input:focus {
    border-color: #00e5ff;
    background: rgba(0, 229, 255, 0.1);
}

#chatbot-send {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00e5ff, #007AFF);
    border: none;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

#chatbot-send:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 15px rgba(0, 229, 255, 0.4);
}

/* Scrollbar */
#chatbot-messages::-webkit-scrollbar {
    width: 6px;
}

#chatbot-messages::-webkit-scrollbar-track {
    background: transparent;
}

#chatbot-messages::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.2);
    border-radius: 3px;
}

#chatbot-messages::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.3);
}

/* Responsive */
@media (max-width: 480px) {
    #chatbot-window {
        width: calc(100vw - 40px);
        height: calc(100vh - 120px);
        bottom: 70px;
        right: 0;
    }
}
</style>

<script>
let chatbotOpen = false;
let chatbotHistory = [];

function toggleChatbot() {
    const window = document.getElementById('chatbot-window');
    const button = document.getElementById('chatbot-button');
    const badge = document.querySelector('.chatbot-badge');
    
    chatbotOpen = !chatbotOpen;
    
    if (chatbotOpen) {
        window.classList.add('active');
        button.style.display = 'none';
        badge.classList.add('hidden');
        document.getElementById('chatbot-input').focus();
    } else {
        window.classList.remove('active');
        button.style.display = 'flex';
    }
    
    // Re-init Lucide icons
    if (window.lucide) {
        lucide.createIcons();
    }
}

function handleChatbotKeyPress(event) {
    if (event.key === 'Enter') {
        sendChatbotMessage();
    }
}

async function sendChatbotMessage() {
    const input = document.getElementById('chatbot-input');
    const message = input.value.trim();
    
    if (!message) return;
    
    // Add user message
    addChatbotMessage(message, 'user');
    input.value = '';
    
    // Show typing indicator
    showTypingIndicator();
    
    try {
        // Send to API
        const response = await fetch('/api/prompt', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ message })
        });
        
        const data = await response.json();
        
        // Remove typing indicator
        removeTypingIndicator();
        
        // Add bot response
        if (data.status === 'ok') {
            addChatbotMessage(data.result.response, 'bot');
        } else {
            addChatbotMessage('Sorry, I encountered an error. Please try again.', 'bot');
        }
        
    } catch (error) {
        removeTypingIndicator();
        addChatbotMessage('Sorry, I\'m having trouble connecting. Please try again.', 'bot');
    }
}

function addChatbotMessage(text, sender) {
    const messagesContainer = document.getElementById('chatbot-messages');
    const messageDiv = document.createElement('div');
    messageDiv.className = `chatbot-message ${sender}`;
    
    const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    
    messageDiv.innerHTML = `
        <div class="message-content">
            ${text}
            <div class="message-time">${time}</div>
        </div>
    `;
    
    messagesContainer.appendChild(messageDiv);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
    
    // Re-init Lucide icons if needed
    if (window.lucide) {
        lucide.createIcons();
    }
}

function showTypingIndicator() {
    const messagesContainer = document.getElementById('chatbot-messages');
    const typingDiv = document.createElement('div');
    typingDiv.id = 'typing-indicator';
    typingDiv.className = 'chatbot-message bot';
    typingDiv.innerHTML = `
        <div class="message-content">
            <span style="display: inline-flex; gap: 4px;">
                <span style="width: 8px; height: 8px; background: #00e5ff; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both;"></span>
                <span style="width: 8px; height: 8px; background: #00e5ff; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; animation-delay: 0.2s;"></span>
                <span style="width: 8px; height: 8px; background: #00e5ff; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; animation-delay: 0.4s;"></span>
            </span>
        </div>
    `;
    messagesContainer.appendChild(typingDiv);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

function removeTypingIndicator() {
    const typingIndicator = document.getElementById('typing-indicator');
    if (typingIndicator) {
        typingIndicator.remove();
    }
}

// Initialize
document.addEventListener('DOMContentLoaded', () => {
    // Re-init Lucide icons
    if (window.lucide) {
        lucide.createIcons();
    }
});
</script>
